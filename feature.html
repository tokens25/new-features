<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DAZN — Feature</title>
<style>
  :root{
    --font-family: 'DAZN Oscine', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

    /* light theme (default) */
    --bg: #FFFFFF;
    --panel: #F5F5F7;
    --card: #FFFFFF;             /* tiles, stat cards, menus */
    --ink: #1D1D1F;
    --ink-2: #6E6E73;
    --line: #E5E5E7;
    --brand: #F7FF1A;
    --btn-ink: #080E12;
    /* component surfaces (swapped in dark) */
    --header-bg: rgba(255,255,255,0.8);
    --surface-hover: #EDEDF0;
    --border-hover: #D9D9DE;
    --pill-bg: rgba(245,245,247,0.9);
    --fade-rgb: 255,255,255;     /* fhero bottom fade + section fades */
    --label-bg: #ececec;
    --label-ink: #0C1216;
    --track: #EAEAEE;            /* gauge track */
    --ph-ico: #c9c9ce;
    --ph-ico-lg: #dcdce0;
    --dot: #b6b6bb;
    --dot-active: #6e6e73;
    --btn-bg: #080E12;
    --btn-fg: #FFFFFF;
    --btn-hover: #000000;
    --page-bg: #EAEAEE;
    --gallery-bg: #FAFBFC;

    --max: 1120px;
    --gm: 40px;

    --sp-8:8px; --sp-12:12px; --sp-16:16px; --sp-20:20px; --sp-24:24px;
    --sp-32:32px; --sp-40:40px; --sp-48:48px; --sp-64:64px; --sp-80:80px;
    --sp-96:96px; --sp-120:120px;
    --r-16:16px; --r-20:20px; --r-28:28px; --r-full:9999px;
  }

  /* ============ DARK THEME (per-entry, e.g. Win Probability) ============ */
  :root[data-theme="dark"]{
    --bg: #080E12;
    --panel: #0C1216;
    --card: #12181D;
    --ink: #FAFBFC;
    --ink-2: #9AA3A9;
    --line: #21292E;
    --header-bg: rgba(8,14,18,0.8);
    --surface-hover: #1B2227;
    --border-hover: #2A3238;
    --pill-bg: rgba(255,255,255,0.06);
    --fade-rgb: 8,14,18;
    --label-bg: #21292E;
    --label-ink: #FAFBFC;
    --track: #21292E;
    --ph-ico: #2A3238;
    --ph-ico-lg: #20272C;
    --dot: #3A424A;
    --dot-active: #76828C;
    --btn-bg: #FAFBFC;
    --btn-fg: #080E12;
    --btn-hover: #F7FF1A;
    --page-bg: #080E12;
    --gallery-bg: #0C1216;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }
  html{ scroll-behavior:smooth; background: var(--panel); overscroll-behavior-y: none; }
  body{
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-family);
    -webkit-font-smoothing: antialiased;
    line-height: 1.1;
  }
  #page{ background: var(--page-bg); }
  a{ color:inherit; text-decoration:none; }
  img{ display:block; max-width:100%; }

  /* ============ HEADER ============ */
  .header{
    position: sticky; top:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    height: 64px; padding: 0 var(--gm);
    background: var(--header-bg);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--line);
  }
  .header .logo svg{ height: 28px; width:auto; display:block; }
  .header .logo svg path{ fill: var(--ink); }
  .header__left{ display:flex; align-items:center; gap: var(--sp-24); }
  .header__back{
    font-size: 14px; font-weight:600; color: var(--ink-2);
    display:inline-flex; align-items:center; gap:6px;
    transition: color .15s ease;
  }
  .header__back:hover{ color: var(--ink); }
  .header__back svg{ width:20px; height:20px; }

  /* Export dropdown — light-theme readable menu */
  .dropdown{ position:relative; }
  .dropdown__toggle{
    display:inline-flex; align-items:center; gap:8px;
    height:40px; padding:0 16px; border-radius:10px;
    background:var(--panel); color:var(--ink); border:1px solid var(--line);
    font-family:inherit; font-size:15px; font-weight:600; cursor:pointer;
    transition: background-color .15s ease, border-color .15s ease;
  }
  .dropdown__toggle:hover{ background:var(--surface-hover); border-color:var(--border-hover); }
  .dropdown__toggle svg{ width:20px; height:20px; transition: transform .2s ease; }
  .dropdown.open .dropdown__toggle svg{ transform: rotate(180deg); }
  .dropdown__menu{
    position:absolute; top:calc(100% + 8px); right:0; min-width:220px;
    background:var(--card); border:1px solid var(--line); border-radius:14px; overflow:hidden;
    box-shadow: 0 14px 34px rgba(0,0,0,0.14);
    opacity:0; visibility:hidden; transform:translateY(-6px);
    transition: opacity .16s ease, transform .16s ease, visibility .16s;
    z-index:60;
  }
  .dropdown.open .dropdown__menu{ opacity:1; visibility:visible; transform:none; }
  .dropdown__item{
    display:block; width:100%; padding:14px 18px;
    border:none; background:none; font-family:inherit; font-size:15px; font-weight:600;
    color:var(--ink); text-align:left; cursor:pointer;
    transition: background-color .12s ease;
  }
  .dropdown__item + .dropdown__item{ border-top:1px solid var(--line); }
  .dropdown__item:hover{ background: var(--panel); }

  /* ============ BUTTONS ============ */
  .btn{
    display:inline-flex; align-items:center; justify-content:center;
    height: 44px; padding: 0 22px; border-radius: var(--r-full);
    font-size: 15px; font-weight:600; white-space:nowrap;
    border: 1px solid transparent; transition: background-color .15s ease, transform .12s ease;
  }
  .btn--solid{ background: var(--btn-bg); color: var(--btn-fg); }
  .btn--solid:hover{ background: var(--btn-hover); }
  .btn:active{ transform: translateY(1px); }

  /* ============ SECTION SHELL ============ */
  .wrap{ max-width: var(--max); margin: 0 auto; padding: 0 var(--gm); }
  .eyebrow{
    font-size: 21px; font-weight:700; text-align:center; margin-bottom: var(--sp-16);
  }
  .section{ padding: var(--sp-120) 0; }

  /* ============ HERO ============ */
  .fhero{
    --fp: 0; /* scroll progress 0→1: full-bleed → wrap width */
    position:relative; overflow:hidden;
    min-height: 82vh; display:flex; align-items:flex-end;
    background: var(--panel);
    margin-left: calc(var(--fp) * max(0px, (100% - var(--max)) / 2));
    margin-right: calc(var(--fp) * max(0px, (100% - var(--max)) / 2));
    border-radius: calc(var(--fp) * 28px);
  }
  .fhero--image{ background: var(--panel); }
  .fhero__ph{ position:absolute; inset:0; z-index:0; display:flex; align-items:center; justify-content:center; }
  .fhero__ph picture{ display:block; width:100%; height:100%; }
  .fhero__ph img{
    width:100%; height:100%; object-fit:cover; object-position:center 78%;
    /* cover fills the frame edge-to-edge at any size; anchor low so the empty top
       is what gets cropped and the darker floor sits under the headline */
    transform-origin: center;
  }
  /* My Clips hero is centered/full — keep it centered so the devices aren't clipped */
  .fhero--herom .fhero__ph img{ object-position: center; }
  /* Fade the bottom of the image into the page background colour (solid at the base) so
     the full-bleed hero blends seamlessly into the section below it. */
  .fhero.fhero--herom::after{
    background: linear-gradient(180deg,
      rgba(var(--fade-rgb),0) 42%,
      rgba(var(--fade-rgb),0.65) 68%,
      rgba(var(--fade-rgb),0.92) 86%,
      rgba(var(--fade-rgb),1) 100%);
  }
  .fhero__inner > div{ will-change: transform, opacity; }
  .fhero::after{
    content:""; position:absolute; inset:0;
    background: linear-gradient(180deg, rgba(var(--fade-rgb),0) 32%, rgba(var(--fade-rgb),0.55) 66%, rgba(var(--fade-rgb),0.95) 100%);
    pointer-events:none;
  }
  .fhero__inner{
    position:relative; z-index:1; width:100%;
    max-width: var(--max); margin:0 auto; padding: var(--sp-48) var(--gm);
    display:flex; align-items:flex-end; justify-content:space-between; gap: var(--sp-24); flex-wrap:wrap;
  }
  .fhero__eyebrow{ font-size: 24px; font-weight:600; margin-bottom: var(--sp-16); }
  .fhero h1{
    font-size: 68px; line-height:1.03; font-weight:700; letter-spacing:-0.02em; max-width: 600px;
  }
  .fhero__desc{ margin-top: var(--sp-16); font-size: 19px; line-height: 1.5; font-weight: 500; color: var(--ink-2); max-width: 460px; }
  .fhero__sub{ margin-top: var(--sp-20); font-size:17px; font-weight:600; color: var(--ink-2); }
  .fhero__type{
    display:inline-block; font-size:17px; font-weight:700; color: var(--ink);
    text-decoration: underline; text-underline-offset: 3px; text-decoration-thickness: 1.5px;
    transition: color .2s ease;
  }
  .fhero__type:hover{ color: var(--ink-2); }
  .fhero__labels{ margin-top: 14px; display:flex; flex-wrap:wrap; align-items:center; gap: 8px; }
  /* DAZN label — gray primary (default) */
  .dlabel{
    display:inline-flex; flex-direction:row; align-items:center; gap: 4px;
    height: 24px; padding: 0 8px; border-radius: 2px;
    font-family: 'DAZN Oscine', var(--font-family, sans-serif);
    font-weight: 700; font-size: 14px; line-height: 14px;
    white-space: nowrap;
    background: var(--label-bg); color: var(--label-ink);
  }
  .pricepill{
    display:inline-flex; align-items:center; gap: var(--sp-16);
    background: var(--pill-bg); backdrop-filter: blur(8px);
    border-radius: var(--r-full); padding: 8px 8px 8px 22px;
  }
  .pricepill span{ font-size:16px; font-weight:600; }

  /* ============ CLOSER LOOK (accordion + image) ============ */
  .closer h2{ font-size: 48px; font-weight:700; letter-spacing:-0.02em; margin-bottom: var(--sp-64); }
  .closer__grid{ display:grid; grid-template-columns: 2fr 1fr; gap: var(--sp-48); align-items:center; }
  .accordion{ display:flex; flex-direction:column; gap: var(--sp-16); max-width: 460px; }
  .acc__item{ background: var(--panel); border-radius: var(--r-28); overflow:hidden; }
  .acc__head{
    width:100%; text-align:left; background:none; border:none; cursor:pointer;
    display:flex; align-items:center; gap: var(--sp-16);
    padding: 18px 24px; font-family:inherit; font-size:18px; font-weight:600; color:var(--ink);
  }
  .acc__icon{
    flex:0 0 26px; width:26px; height:26px; border-radius:50%;
    border:1.5px solid var(--ink); position:relative; transition: transform .25s ease;
  }
  .acc__icon::before, .acc__icon::after{
    content:""; position:absolute; top:50%; left:50%; background: var(--ink);
    transform: translate(-50%,-50%);
  }
  .acc__icon::before{ width:11px; height:1.6px; }
  .acc__icon::after{ width:1.6px; height:11px; transition: transform .25s ease; }
  .acc__item.open .acc__icon::after{ transform: translate(-50%,-50%) scaleY(0); }
  .acc__body{
    max-height:0; overflow:hidden; transition: max-height .3s ease;
    padding: 0 24px;
  }
  .acc__body p{ font-size:15px; line-height:1.6; color:var(--ink-2); padding-bottom: 22px; }
  .closer__media{
    border-radius: var(--r-20); overflow:hidden; background: #FFFFFF;
    aspect-ratio: 3/2; display:flex; align-items:center; justify-content:center;
  }
  .closer__media img{ width:100%; height:100%; object-fit:cover; transition: opacity .3s ease; }

  /* ============ GALLERY ============ */
  .gallery{ overflow-x: clip; }
  .gallery__grid{ display:grid; grid-template-columns: repeat(2,1fr); gap: var(--sp-24); }
  .tile{
    background: var(--card); border-radius: var(--r-20); overflow:hidden;
    aspect-ratio: 1/1; display:flex; align-items:center; justify-content:center;
  }
  /* Scroll-in: tiles arrive from their four corners (gated on .reveal) */
  .gallery__grid.reveal .tile{
    opacity: 0;
    transition: opacity .55s ease, transform .7s cubic-bezier(.22,.61,.36,1);
    will-change: transform, opacity;
  }
  .gallery__grid.reveal .tile:nth-child(1){ transform: translate(-50px, -50px); }
  .gallery__grid.reveal .tile:nth-child(2){ transform: translate(50px, -50px); }
  .gallery__grid.reveal .tile:nth-child(3){ transform: translate(-50px, 50px); }
  .gallery__grid.reveal .tile:nth-child(4){ transform: translate(50px, 50px); }
  .gallery__grid.reveal .tile.in{ opacity: 1; transform: none; }
  .tile img{ width:100%; height:100%; object-fit:cover; }
  .ph-ico{ width:64px; height:64px; color:var(--ph-ico); }
  .fhero__ph .ph-ico, .statement__ph .ph-ico{ width:112px; height:112px; color:var(--ph-ico-lg); }
  .gallery__cap{ margin-bottom: var(--sp-40); font-size: 24px; line-height:1.4; font-weight:600; max-width: 780px; }
  .gallery__cap .muted{ color: var(--ink-2); }

  /* ============ HIGHLIGHTS CAROUSEL ============ */
  .highlights__head{
    display:flex; align-items:baseline; justify-content:space-between; gap: var(--sp-24);
    margin-bottom: var(--sp-48);
  }
  .highlights__head h2{ font-size: 48px; font-weight:700; letter-spacing:-0.02em; }
  .highlights__film{ font-size: 19px; font-weight:600; color:#0071E3; white-space:nowrap; }
  .highlights__scroll{
    display:grid;
    grid-auto-flow: column;
    grid-auto-columns: min(900px, 84vw);
    gap: var(--sp-24);
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    scroll-padding-left: var(--gm);
    padding: 0 var(--gm);
    scrollbar-width: none;
  }
  .highlights__scroll::-webkit-scrollbar{ display: none; }

  .highlights__dots{
    display:flex; align-items:center; gap: var(--sp-16);
    width: fit-content; margin: var(--sp-40) auto 0;
    padding: 14px 22px;
  }
  .highlights__dots button{
    border:none; padding:0; cursor:pointer;
    width: 8px; height: 8px; border-radius: var(--r-full);
    background: var(--dot);
    transition: width .25s ease, background-color .25s ease;
  }
  .highlights__dots button.is-active{ width: 40px; background: var(--dot-active); }
  .hcard{
    position:relative;
    scroll-snap-align: start;
    aspect-ratio: 16 / 10;
    background: var(--card);
    border-radius: var(--r-20);
    overflow:hidden;
  }
  .hcard__media{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:0; }
  .hcard__media img{ width:100%; height:100%; object-fit:cover; object-position: center calc(50% + 60px); }
  .highlights__scroll .hcard:nth-child(4) .hcard__media img{ object-fit: contain; transform: scale(0.85); object-position: center calc(50% + 80px); }
  /* Per-entry (e.g. Scores): images fill each card, centered, no multiview-specific offsets */
  .highlights__scroll--fill .hcard__media img{ object-fit: cover; object-position: center; transform: none; }
  .highlights__scroll--fill .hcard:nth-child(4) .hcard__media img{ object-fit: cover; object-position: center; transform: none; }
  .hcard__cap{
    position:absolute; z-index:1;
    top: var(--sp-40); right: var(--sp-40); left: 50%;
    font-size: 26px; line-height:1.28; font-weight:600; color: var(--ink);
  }
  /* Per-entry (Scores): image on top, caption below it (Apple-style) instead of overlaid */
  .highlights__scroll--capbelow .hcard{ aspect-ratio: auto; background: transparent; border-radius: 0; overflow: visible; }
  .highlights__scroll--capbelow .hcard__media{ position: relative; inset: auto; width: 100%; aspect-ratio: 16 / 10; border-radius: var(--r-20); overflow: hidden; }
  .highlights__scroll--capbelow .hcard__cap{ position: static; top:auto; right:auto; left:auto; margin-top: var(--sp-20); font-size: 24px; line-height: 1.4; font-weight: 700; color: var(--ink); max-width: none; }
  /* Per-entry (My Clips): caption below has a bold 24px title + description */
  .highlights__scroll--capbelow .hcard__cap-title{ display:block; font-size: 24px; line-height: 1.25; font-weight: 700; color: var(--ink); }
  .highlights__scroll--capbelow .hcard__cap-desc{ display:block; margin-top: var(--sp-8); font-size: 17px; line-height: 1.5; font-weight: 500; color: var(--ink-2); }

  /* ============ GAUGES (animated meters) ============ */
  .gauges{ text-align:center; background: var(--panel); }
  .gauges__title{ font-size: 40px; font-weight:700; letter-spacing:-0.02em; margin-bottom: var(--sp-64); }
  .gauges__row{ display:flex; justify-content:center; align-items:flex-start; gap: 72px; flex-wrap:wrap; }
  .gauge{ display:flex; flex-direction:column; align-items:center; gap: var(--sp-16); }
  .gauge__ring{ position:relative; width: 190px; height: 190px; }
  .gauge__svg{ width:100%; height:100%; display:block; }
  .gauge__track{ fill:none; stroke:var(--track); stroke-width:9; stroke-linecap:round; stroke-dasharray: 245 82; }
  .gauge__value{
    fill:none; stroke-width:9; stroke-linecap:round;
    stroke-dasharray: 327; stroke-dashoffset: 327;
    transition: stroke-dashoffset 1.4s cubic-bezier(.2,.7,.2,1);
  }
  .gauge__num{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size: 32px; font-weight:700; letter-spacing:-0.01em; color: var(--ink);
  }
  .gauge__label{ font-size: 15px; font-weight:600; color: var(--ink-2); }
  @media (prefers-reduced-motion: reduce){ .gauge__value{ transition: none; } }

  /* ============ STAT CARDS (big number + label) ============ */
  .statcards{ overflow-x: clip; }
  .statcards__title{ font-size: 48px; font-weight:700; letter-spacing:-0.02em; margin-bottom: var(--sp-48); }
  .statcards__grid{ display:grid; grid-template-columns: repeat(3, 1fr); gap: var(--sp-24); }
  .statcard{
    background: var(--card);
    border-radius: var(--r-20);
    padding: var(--sp-40);
    min-height: 320px;
    display:flex; flex-direction:column; justify-content:flex-end;
  }
  .statcard__num{ font-size: 64px; font-weight:700; line-height:1; letter-spacing:-0.03em; color: var(--ink); }
  .statcard__label{ margin-top: var(--sp-12); font-size: 20px; font-weight:500; color: var(--ink); }
  /* Scroll-in: left from left, middle from bottom, right from right (gated on .reveal) */
  .statcards__grid.reveal .statcard{
    opacity: 0;
    transition: opacity .6s ease, transform .8s cubic-bezier(.22,.61,.36,1);
    will-change: transform, opacity;
  }
  .statcards__grid.reveal .statcard:nth-child(1){ transform: translateX(-170px); }
  .statcards__grid.reveal .statcard:nth-child(2){ transform: translateY(170px); }
  .statcards__grid.reveal .statcard:nth-child(3){ transform: translateX(170px); }
  .statcards__grid.reveal .statcard.in{ opacity: 1; transform: none; }

  /* ============ CENTERED STATEMENT ============ */
  .centered{ text-align:center; }
  .centered h2{ font-size: 64px; line-height:1.05; font-weight:700; letter-spacing:-0.02em; }
  .centered__lead{
    max-width: 720px; margin: var(--sp-24) auto 0;
    font-size: 21px; line-height:1.5; color: var(--ink-2); font-weight:500;
  }
  .cards{ display:grid; grid-template-columns: repeat(2,1fr); gap: var(--sp-24); margin-top: var(--sp-80); text-align:left; }
  .card2__media{
    border-radius: var(--r-20); overflow:hidden; background: var(--panel);
    aspect-ratio: 16/11; display:flex; align-items:center; justify-content:center;
  }
  .card2__media img{ width:100%; height:100%; object-fit:cover; }
  .card2__cap{ margin-top: var(--sp-24); font-size: 21px; line-height:1.45; font-weight:600; }
  .card2__cap .muted{ color: var(--ink-2); }

  /* ============ BIG STATEMENT (image bg) ============ */
  .statement{
    position:relative; overflow:hidden; text-align:center;
    min-height: 92vh; display:flex; flex-direction:column; justify-content:flex-end;
    padding: var(--sp-96) var(--gm) var(--sp-96);
    background: var(--panel);
  }
  .statement__ph{ position:absolute; inset:0; z-index:0; display:flex; align-items:center; justify-content:center; }
  .statement__ph img{ width:100%; height:100%; object-fit:cover; }
  .statement--image .statement__ph::after{
    content:''; position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(8,14,18,0.15) 0%, rgba(8,14,18,0.75) 100%);
  }
  .statement--image .eyebrow, .statement--image h2{ color:#FAFBFC; }
  .statement--image .statement__lead{ color:rgba(250,251,252,0.8); }
  .statement__inner{ position:relative; z-index:1; max-width: 900px; margin:0 auto; }
  .statement .eyebrow{ font-size:21px; }
  .statement h2{ font-size: 60px; line-height:1.02; font-weight:700; letter-spacing:-0.025em; }
  .statement__lead{
    max-width: 620px; margin: var(--sp-32) auto 0;
    font-size: 21px; line-height:1.5; color: var(--ink-2); font-weight:500;
  }

  /* ============ FOOTER ============ */
  .footer{ border-top:1px solid var(--line); padding: var(--sp-48) 0; }
  .footer__inner{ max-width:var(--max); margin:0 auto; padding:0 var(--gm); display:flex; justify-content:space-between; align-items:center; gap:var(--sp-16); flex-wrap:wrap; }
  .footer__inner a{ font-size:14px; font-weight:600; color: var(--ink); }
  .footer__inner span{ font-size:13px; color: var(--ink-2); }

  .not-found{ max-width:var(--max); margin:0 auto; padding: var(--sp-96) var(--gm); font-size:20px; color:var(--ink-2); }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 900px){
    :root{ --gm: 24px; }
    .section{ padding: var(--sp-80) 0; }
    .fhero h1{ font-size: 40px; }
    .fhero__inner{ flex-direction:column; align-items:flex-start; }
    .fhero__ph img{ object-fit: contain; object-position: center 20px; transform: scale(calc((1 - var(--fp, 0) * 0.3) * 1.1)); }
    /* Entries with a dedicated portrait mobile hero: fill, anchored to the top so the
       phone rises above the headline overlay instead of clashing with it */
    .fhero--herom .fhero__ph img{ object-fit: cover; object-position: center top; transform: none; }
    .statement__ph img{ object-position: 35% center; }
    .closer h2{ font-size: 34px; margin-bottom: var(--sp-40); }
    .closer__grid{ grid-template-columns: 1fr; gap: var(--sp-32); }
    .closer__media{ order:-1; aspect-ratio: 4/3; }
    .accordion{ max-width:none; }
    .gallery__grid{ grid-template-columns: 1fr; }
    .gallery__cap{ font-size: 20px; }
    .highlights__scroll--capbelow .hcard__cap{ font-size: 20px; }
    .highlights__scroll--capbelow .hcard__cap-title{ font-size: 20px; }
    .highlights__scroll--capbelow .hcard__cap-desc{ font-size: 16px; }
    .highlights__head{ flex-direction:column; align-items:flex-start; gap: var(--sp-8); }
    .highlights__head h2{ font-size: 32px; }
    .highlights__scroll{ grid-auto-columns: 86vw; }
    .hcard__cap{ left: var(--sp-24); right: var(--sp-24); top: var(--sp-24); font-size: 19px; }
    .gauges__title{ font-size: 28px; margin-bottom: var(--sp-40); }
    .gauges__row{ gap: 32px; }
    .gauge__ring{ width: 150px; height: 150px; }
    .gauge__num{ font-size: 26px; }
    .statcards__title{ font-size: 34px; margin-bottom: var(--sp-32); }
    .statcards__grid{ grid-template-columns: 1fr; }
    .statcard{ min-height: 220px; }
    .statcard__num{ font-size: 52px; }
    .centered h2{ font-size: 38px; }
    .cards{ grid-template-columns: 1fr; margin-top: var(--sp-48); }
    .statement h2{ font-size: 44px; }
    .statement{ min-height: 78vh; }
  }
</style>

  <script src="entries.js"></script>
  <script>
    // Placeholder block — images are structural only for now
    const PH = `<svg class="ph-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="9.5" r="1.6"/><path d="M21 14l-5-5-8 8"/></svg>`;

    const params = new URLSearchParams(location.search);
    const entry = (window.DAZN_ENTRIES || []).find(e => e.id === params.get('id'));
    const page = document.getElementById('page');

    if (!entry) {
      page.innerHTML = `<p class="not-found">We couldn't find that update. Head back to <a href="index.html" style="text-decoration:underline">What's New</a>.</p>`;
    } else {
      document.title = `${entry.name} — DAZN`;

      // Per-entry theme (e.g. Win Probability ships in dark mode)
      if (entry.theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      else document.documentElement.removeAttribute('data-theme');

      // Short platform string, e.g. "Smart TV, Web"
      const platforms = entry.product.replace('DAZN app · ', '');

      // Hero metadata labels: Date · Market · Devices · Users (related values comma-joined into one label)
      const metaValues = [
        entry.date,
        (entry.market  || []).join(', '),
        (entry.devices || []).join(', '),
        (entry.users   || []).join(', ')
      ].filter(Boolean);
      const heroLabels = metaValues.map(v => `<span class="dlabel">${v}</span>`).join('');

      // Accordion items. `accordionSectionsOnly` renders just the entry's sections
      // (e.g. My Clips: the 3 how-it-works steps); otherwise sections + service items.
      let accItems;
      if (entry.accordionSectionsOnly) {
        accItems = entry.sections.map(s => ({ h: s.heading, t: s.text }));
      } else {
        accItems = [
          { h: entry.sections[0].heading, t: entry.sections[0].text },
          { h: entry.sections[1].heading, t: entry.sections[1].text },
          { h: 'Where you can watch', t: `${entry.name} is available on ${entry.product}. Sign in with your DAZN account on any supported device to get started.` }
        ];
        if (!entry.hideGoodToKnow) accItems.push({ h: 'Good to know', t: entry.tip });
      }

      const acc = accItems.map((it, i) => `
        <div class="acc__item${i === 0 ? ' open' : ''}">
          <button class="acc__head" aria-expanded="${i === 0}">
            <span class="acc__icon"></span>${it.h}
          </button>
          <div class="acc__body"><p>${it.t}</p></div>
        </div>`).join('');

      const galleryTiles = [0, 1, 2, 3].map(i =>
        `<div class="tile">${entry.galleryImages && entry.galleryImages[i] ? `<img src="${entry.galleryImages[i]}" alt="">` : PH}</div>`).join('');

      // Horizontally-scrolling highlight cards. `highlightItems` (title + text) takes
      // priority; otherwise fall back to single-line captions.
      const hImg = (i) => entry.highlightImages && entry.highlightImages[i] ? `<img src="${entry.highlightImages[i]}" alt="">` : PH;
      let hcards, hCount;
      if (entry.highlightItems) {
        hCount = entry.highlightItems.length;
        hcards = entry.highlightItems.map((it, i) => `
          <article class="hcard">
            <div class="hcard__media">${hImg(i)}</div>
            <div class="hcard__cap"><span class="hcard__cap-title">${it.title}</span><span class="hcard__cap-desc">${it.text}</span></div>
          </article>`).join('');
      } else {
        const highlightCaps = [entry.tagline, entry.sections[0].text, entry.sections[1].text, entry.tip]
          .map((t, i) => (entry.highlightCaps && entry.highlightCaps[i]) || t)
          .slice(0, entry.highlightsThree ? 3 : 4);
        hCount = highlightCaps.length;
        hcards = highlightCaps.map((t, i) => `
          <article class="hcard">
            <div class="hcard__media">${hImg(i)}</div>
            <p class="hcard__cap">${t}</p>
          </article>`).join('');
      }
      const hdots = Array.from({ length: hCount }, (_, i) => `<button${i === 0 ? ' class="is-active"' : ''} aria-label="Go to card ${i + 1}"></button>`).join('');

      // Animated gauges (arc draws in + number counts up on scroll)
      const gaugeData = [
        { pct: 0.78, target: 66000, label: 'Live hours a year' },
        { pct: 0.55, target: 3489,  label: 'Events this month' },
        { pct: 0.88, target: 890,   label: 'Competitions' }
      ];
      const gauges = gaugeData.map((g, i) => `
        <div class="gauge" data-pct="${g.pct}">
          <div class="gauge__ring">
            <svg class="gauge__svg" viewBox="0 0 120 120" aria-hidden="true">
              <defs>
                <linearGradient id="gGrad${i}" x1="0%" y1="100%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#8923A0" stop-opacity="0.7"/>
                  <stop offset="23%" stop-color="#F1A322"/>
                  <stop offset="100%" stop-color="#F7FF1A"/>
                </linearGradient>
              </defs>
              <circle class="gauge__track" cx="60" cy="60" r="52" transform="rotate(135 60 60)"/>
              <circle class="gauge__value" cx="60" cy="60" r="52" stroke="url(#gGrad${i})" transform="rotate(135 60 60)"/>
            </svg>
            <span class="gauge__num" data-target="${g.target}">0</span>
          </div>
          <span class="gauge__label">${g.label}</span>
        </div>`).join('');

      const statCards = [
        { display: '5,5M', target: 5.5, decimals: 1, suffix: 'M', label: 'subscribers worldwide' },
        { display: '200+', target: 200, decimals: 0, suffix: '+', label: 'markets served' },
        { display: '9',    target: 9,   decimals: 0, suffix: '',  label: 'sports on one app' }
      ];
      const statcardsHtml = statCards.map(s => `
        <div class="statcard">
          <div class="statcard__num" data-target="${s.target}" data-decimals="${s.decimals}" data-suffix="${s.suffix}">${s.display}</div>
          <div class="statcard__label">${s.label}</div>
        </div>`).join('');

      page.innerHTML = `
        <!-- HERO -->
        <section class="fhero${entry.heroImage ? ' fhero--image' : ''}${entry.heroImageMobile ? ' fhero--herom' : ''}">
          <div class="fhero__ph">${entry.heroImage ? `<picture><source media="(max-width: 640px)" srcset="${entry.heroImageMobile || entry.heroImage}"><img src="${entry.heroImage}" alt=""></picture>` : PH}</div>
          <div class="fhero__inner">
            <div>
              <div class="fhero__eyebrow">${entry.heroEyebrow || entry.name}</div>
              <h1>${entry.tagline}</h1>
              ${entry.heroSub ? `<p class="fhero__desc">${entry.heroSub}</p>` : ''}
              <p class="fhero__sub"><a class="fhero__type" href="index.html">${entry.labelText}</a></p>
              <div class="fhero__labels">${heroLabels}</div>
            </div>
            <div class="pricepill">
              <span>Included with DAZN</span>
              <a class="btn btn--solid" href="#">${entry.ctaText} →</a>
            </div>
          </div>
        </section>

        <!-- CLOSER LOOK -->
        <section class="section closer">
          <div class="wrap">
            <h2>${entry.closerHeading || 'New Features'}</h2>
            <div class="closer__grid">
              <div class="closer__media">${entry.closerImages ? `<img src="${entry.closerImages[0]}" alt="">` : PH}</div>
              <div class="accordion">${acc}</div>
            </div>
          </div>
        </section>

        <!-- STAT CARDS -->
        <section class="section statcards" style="background:var(--panel)">
          <div class="wrap">
            <h2 class="statcards__title">Closer look</h2>
            <div class="statcards__grid">${statcardsHtml}</div>
          </div>
        </section>

        <!-- GALLERY -->
        <section class="section gallery" style="background:var(--gallery-bg)">
          <div class="wrap">
            <p class="gallery__cap"><strong>Made for every screen.</strong> <span class="muted">Watch ${entry.name} on ${platforms} — wherever the match takes you, with the same seamless experience.</span></p>
            <div class="gallery__grid">${galleryTiles}</div>
          </div>
        </section>

        <!-- HIGHLIGHTS CAROUSEL -->
        <section class="section highlights">
          <div class="wrap highlights__head">
            <h2>Get the highlights.</h2>
          </div>
          <div class="highlights__scroll${entry.highlightsFill ? ' highlights__scroll--fill' : ''}${entry.highlightsCaptionBelow ? ' highlights__scroll--capbelow' : ''}">${hcards}</div>
          <div class="highlights__dots">${hdots}</div>
        </section>

        <!-- GAUGES -->
        ${entry.hideGauges ? '' : `
        <section class="section gauges">
          <div class="wrap">
            <h2 class="gauges__title">By the numbers.</h2>
            <div class="gauges__row">${gauges}</div>
          </div>
        </section>`}

        <!-- CENTERED STATEMENT -->
        <section class="section centered">
          <div class="wrap">
            <p class="eyebrow">${entry.labelText}</p>
            <h2>${entry.centeredHeading || `How ${entry.name} works.`}</h2>
            <p class="centered__lead">${entry.desc}</p>
            <div class="cards">
              <div>
                <div class="card2__media">${entry.worksImages && entry.worksImages[0] ? `<img src="${entry.worksImages[0]}" alt="">` : PH}</div>
                ${entry.centeredNoCaps ? '' : `<p class="card2__cap"><strong>${entry.sections[0].heading}.</strong> <span class="muted">${entry.sections[0].text}</span></p>`}
              </div>
              <div>
                <div class="card2__media">${entry.worksImages && entry.worksImages[1] ? `<img src="${entry.worksImages[1]}" alt="">` : PH}</div>
                ${entry.centeredNoCaps ? '' : `<p class="card2__cap"><strong>${entry.sections[1].heading}.</strong> <span class="muted">${entry.sections[1].text}</span></p>`}
              </div>
            </div>
          </div>
        </section>

        <!-- BIG STATEMENT -->
        <section class="statement${entry.statementImage ? ' statement--image' : ''}">
          <div class="statement__ph">${entry.statementImage ? `<img src="${entry.statementImage}" alt="">` : PH}</div>
          <div class="statement__inner">
            <p class="eyebrow">${entry.name}</p>
            <h2>${entry.title}</h2>
            <p class="statement__lead">${entry.tip}</p>
          </div>
        </section>
      `;

      // Accordion behaviour
      const accEls = [...page.querySelectorAll('.acc__item')];
      const closerImg = page.querySelector('.closer__media img');
      if (closerImg && entry.closerImages) closerImg.dataset.cur = entry.closerImages[0];
      const showCloserImage = (i) => {
        const src = entry.closerImages && entry.closerImages[i];
        if (!closerImg || !src || closerImg.dataset.cur === src) return;
        closerImg.dataset.cur = src;
        new Image().src = src;               // warm the cache to avoid a flash
        closerImg.style.opacity = '0';       // fade out
        setTimeout(() => {                    // then swap + fade back in
          closerImg.src = src;
          closerImg.style.opacity = '1';
        }, 300);
      };
      const setAcc = (item, open) => {
        item.classList.toggle('open', open);
        const body = item.querySelector('.acc__body');
        item.querySelector('.acc__head').setAttribute('aria-expanded', open);
        body.style.maxHeight = open ? body.scrollHeight + 'px' : '0px';
      };
      accEls.forEach((item, idx) => {
        if (item.classList.contains('open')) requestAnimationFrame(() => setAcc(item, true));
        item.querySelector('.acc__head').addEventListener('click', () => {
          const willOpen = !item.classList.contains('open');
          // Single-open: collapse the others, then toggle this one
          accEls.forEach(other => { if (other !== item) setAcc(other, false); });
          setAcc(item, willOpen);
          // Swap the closer image to match the opened accordion item
          if (willOpen) showCloserImage(idx);
        });
      });

      // Highlights carousel: sync pagination dots with scroll position
      const hscroll = page.querySelector('.highlights__scroll');
      const dotEls = [...page.querySelectorAll('.highlights__dots button')];
      if (hscroll && dotEls.length) {
        const step = () => {
          const c = hscroll.querySelector('.hcard');
          return c ? c.offsetWidth + parseFloat(getComputedStyle(hscroll).columnGap || '0') : 1;
        };
        const syncDots = () => {
          const idx = Math.min(dotEls.length - 1, Math.round(hscroll.scrollLeft / step()));
          dotEls.forEach((d, i) => d.classList.toggle('is-active', i === idx));
        };
        let dTick = false;
        hscroll.addEventListener('scroll', () => {
          if (!dTick) { requestAnimationFrame(() => { syncDots(); dTick = false; }); dTick = true; }
        }, { passive: true });
        dotEls.forEach((d, i) => d.addEventListener('click', () => hscroll.scrollTo({ left: i * step(), behavior: 'smooth' })));
      }

      // Gauges: draw the arc and count the number up when scrolled into view
      const gaugeEls = [...page.querySelectorAll('.gauge')];
      if (gaugeEls.length) {
        const ARC = 245, CIRC = 327;
        const fmt = (n) => Math.round(n).toLocaleString('de-DE');
        const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const runGauge = (g) => {
          if (g.dataset.done) return;
          g.dataset.done = '1';
          const pct = parseFloat(g.dataset.pct);
          g.querySelector('.gauge__value').style.strokeDashoffset = (CIRC - pct * ARC).toFixed(1);
          const num = g.querySelector('.gauge__num');
          const target = parseFloat(num.dataset.target);
          if (reduce) { num.textContent = fmt(target); return; }
          const dur = 1400, t0 = performance.now();
          const tick = (t) => {
            const p = Math.min(1, (t - t0) / dur);
            num.textContent = fmt(target * (1 - Math.pow(1 - p, 3)));
            if (p < 1) requestAnimationFrame(tick); else num.textContent = fmt(target);
          };
          requestAnimationFrame(tick);
          setTimeout(() => { num.textContent = fmt(target); }, dur + 400); // fallback
        };
        if ('IntersectionObserver' in window) {
          // Fire only when a gauge reaches the middle of the viewport (central ~20% band)
          const gio = new IntersectionObserver((es) => es.forEach(e => {
            if (e.isIntersecting) { runGauge(e.target); gio.unobserve(e.target); }
          }), { rootMargin: '-40% 0px -40% 0px', threshold: 0 });
          gaugeEls.forEach(g => gio.observe(g));
        } else {
          gaugeEls.forEach(runGauge); // no IntersectionObserver: run immediately
        }
      }

      // Hero: narrows to the wrap width + layered content parallax as you scroll
      const fhero = page.querySelector('.fhero');
      if (fhero && !window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        const RANGE = 340;
        const heroText = fhero.querySelector('.fhero__inner > div');
        const heroPill = fhero.querySelector('.pricepill');
        let fTick = false;
        const updHero = () => {
          const y = window.scrollY;
          fhero.style.setProperty('--fp', Math.min(1, Math.max(0, y / RANGE)).toFixed(3));
          const h = fhero.offsetHeight || 1;
          // Hold full opacity for the first quarter, then fade gently so content lingers longer
          const START = h * 0.25;
          const fade = Math.max(0, 1 - Math.max(0, (y - START) / h) * 1.15).toFixed(3);
          if (heroText) { heroText.style.transform = `translate3d(0, ${(y * -0.42).toFixed(1)}px, 0)`; heroText.style.opacity = fade; }
          if (heroPill) { heroPill.style.transform = `translate3d(0, ${(y * -0.12).toFixed(1)}px, 0)`; heroPill.style.opacity = fade; }
          fTick = false;
        };
        updHero();
        window.addEventListener('scroll', () => {
          if (!fTick) { requestAnimationFrame(updHero); fTick = true; }
        }, { passive: true });
      }

      // Gallery tiles: arrive from four corners on enter, reverse on leave
      const galGrid = page.querySelector('.gallery__grid');
      const galTiles = galGrid ? [...galGrid.querySelectorAll('.tile')] : [];
      if (galGrid && galTiles.length && !window.matchMedia('(prefers-reduced-motion: reduce)').matches && 'IntersectionObserver' in window) {
        galGrid.classList.add('reveal');
        const gio = new IntersectionObserver((es) => es.forEach(e => {
          galGrid.dataset.everFired = '1';
          galTiles.forEach(t => t.classList.toggle('in', e.isIntersecting));
        }), { threshold: 0.2 });
        gio.observe(galGrid);
        setTimeout(() => { if (!galGrid.dataset.everFired) galTiles.forEach(t => t.classList.add('in')); }, 2500);
      }

      // Stat cards: slide in (left / bottom / right) + count up on enter, reverse on leave
      const statGrid = page.querySelector('.statcards__grid');
      const statEls = statGrid ? [...statGrid.querySelectorAll('.statcard')] : [];
      if (statGrid && statEls.length && !window.matchMedia('(prefers-reduced-motion: reduce)').matches && 'IntersectionObserver' in window) {
        statGrid.classList.add('reveal');
        const animateNum = (card, up) => {
          const num = card.querySelector('.statcard__num');
          const target = parseFloat(num.dataset.target);
          const dec = parseInt(num.dataset.decimals || '0', 10);
          const suf = num.dataset.suffix || '';
          const fmt = (n) => (dec > 0 ? n.toFixed(dec).replace('.', ',') : Math.round(n).toString()) + suf;
          const from = parseFloat(num.dataset.cur != null ? num.dataset.cur : (up ? 0 : target));
          const to = up ? target : 0;
          cancelAnimationFrame(card._raf || 0);
          const dur = 1200, t0 = performance.now();
          const tick = (t) => {
            const p = Math.min(1, (t - t0) / dur);
            const val = from + (to - from) * (1 - Math.pow(1 - p, 3));
            num.dataset.cur = val; num.textContent = fmt(val);
            if (p < 1) card._raf = requestAnimationFrame(tick);
            else { num.dataset.cur = to; num.textContent = fmt(to); }
          };
          card._raf = requestAnimationFrame(tick);
        };
        const sio = new IntersectionObserver((es) => es.forEach(e => {
          statGrid.dataset.everFired = '1';
          const show = e.isIntersecting;
          statEls.forEach(c => c.classList.toggle('in', show));
          statEls.forEach(c => animateNum(c, show));
        }), { threshold: 0.3 });
        sio.observe(statGrid);
        // safety net: if the observer never fires (e.g. offscreen renderer), show finals
        setTimeout(() => { if (!statGrid.dataset.everFired) statEls.forEach(c => c.classList.add('in')); }, 2500);
      }
    }
  </script>

  <script>
    /* ---- Export dropdown ---- */
    (() => {
      const dd = document.getElementById('exportMenu');
      if (!dd) return;
      const toggle = dd.querySelector('.dropdown__toggle');
      const open = (state) => {
        dd.classList.toggle('open', state);
        toggle.setAttribute('aria-expanded', state ? 'true' : 'false');
      };
      toggle.addEventListener('click', (e) => { e.stopPropagation(); open(!dd.classList.contains('open')); });
      dd.querySelectorAll('.dropdown__item').forEach(item =>
        item.addEventListener('click', () => open(false)));
      document.addEventListener('click', (e) => { if (!dd.contains(e.target)) open(false); });
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape') open(false); });
    })();
  </script>

</body>
