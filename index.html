<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DAZN — What's New</title>
<style>

  /* ============ DAZN DESIGN TOKENS (Dark theme, Desktop) ============ */
  :root{
    --font-family: 'DAZN Oscine', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

    /* foundations.surface */
    --surface-default: #080E12;
    --surface-1: #0C1216;
    --surface-2: #10171B;
    --surface-3: #1B2227;
    --surface-4: #21292E;
    --surface-5: #2A3238;

    /* foundations.text */
    --text-primary: #FAFBFC;
    --text-secondary: #BCC5CB;
    --text-tertiary: #76828C;
    --text-disabled: #626E78;

    /* foundations.border */
    --border-subtle: #21292E;
    --border-default: #444D53;
    --border-strong: #76828C;

    /* foundations.brand */
    --brand-primary: #F7FF1A;
    --brand-secondary: #F2AF3D;
    --brand-tertiary: #FBED7D;
    --brand-gradient: linear-gradient(270deg, #FBED7D 0%, #F2AF3D 100%);

    /* foundations.accent */
    --accent-live: #D12424;
    --accent-success-text: #79E99C;
    --accent-success-surface1: #043820;
    --accent-blue: #1183FF;
    --accent-purple: #D24AF9;
    --accent-orange: #FF9600;
    --accent-pink: #FF8D8D;

    /* components.label (secondary, dark theme) */
    --label-yellow-secondary-bg: rgba(247, 255, 26, 0.1);
    --label-yellow-secondary-color: #F7FF1A;
    --label-blue-secondary-bg: rgba(17, 131, 255, 0.1);
    --label-blue-secondary-color: #1183FF;
    --label-green-secondary-bg: rgba(121, 233, 156, 0.2);
    --label-green-secondary-color: #79E99C;
    --label-purple-secondary-bg: rgba(190, 95, 224, 0.1);
    --label-purple-secondary-color: #D24AF9;
    --label-red-secondary-bg: rgba(209, 36, 36, 0.3);
    --label-red-secondary-color: #FF8D8D;

    /* typography — desktop */
    --display-1: 56px;
    --display-2: 48px;
    --display-4: 36px;
    --heading-h4: 28px;
    --heading-h5: 24px;
    --heading-h6: 22px;
    --body-lg: 20px;
    --body-default: 18px;
    --caption-sm: 14px;
    --caption-xs: 12px;
    --label-sm: 14px;

    /* spacing */
    --sp-4: 4px; --sp-6:6px; --sp-8: 8px; --sp-12: 12px; --sp-16: 16px;
    --sp-20: 20px; --sp-24: 24px; --sp-32: 32px; --sp-40: 40px;
    --sp-48: 48px; --sp-64: 64px; --sp-80: 80px; --sp-96: 96px; --sp-120: 120px;

    /* radius */
    --radius-8: 8px; --radius-12: 12px; --radius-16: 16px; --radius-20: 20px; --radius-full: 9999px;

    /* grid */
    --grid-margin: 64px;
    --max-width: 1200px;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html{ scroll-behavior:smooth; background: var(--surface-default); overscroll-behavior-y: none; }

  body{
    background: #FFFFFF;
    color: var(--text-primary);
    font-family: var(--font-family);
    -webkit-font-smoothing: antialiased;
  }

  a{ color:inherit; text-decoration:none; }

  ::selection{ background: var(--brand-primary); color:#080E12; }

  /* ============ BUTTONS (dual-CTA pattern) ============ */
  /* DAZN design system button — Lg form (48px, 8px radius, 16/700) */
  .btn{
    display:inline-flex;
    flex-direction:row;
    align-items:center;
    justify-content:center;
    gap: var(--sp-8);
    height: 48px;
    padding: 0 var(--sp-16);
    border-radius: var(--radius-8);
    font-family: var(--font-family);
    font-size: 16px;
    line-height: 16px;
    font-weight: 700;
    white-space:nowrap;
    border: 1px solid transparent;
    cursor: pointer;
    transition: background-color .15s ease, border-color .15s ease, color .15s ease, transform .15s ease;
  }
  .btn:active{ transform: translateY(1px); }
  /* Colors kept: white with black border; hover fills yellow */
  .btn--solid{ background: #FFFFFF; color: #080E12; border-color: #080E12; }
  .btn--solid:hover{ background: var(--brand-primary); }
  /* low-commitment / learn more */
  .btn--ghost{ border-color: var(--border-default); color: var(--text-primary); }
  .btn--ghost:hover{ border-color: var(--border-strong); background: rgba(255,255,255,0.04); }
  .btn--sm{ height: 32px; padding: 0 var(--sp-8); font-size: 12px; }

  /* ============ HEADER ============ */
  .header{
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 50;
    display:flex;
    align-items:center;
    gap: var(--sp-16);
    height: 72px;
    padding: 0 var(--grid-margin);
    background: rgba(8,14,18,0.82);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border-subtle);
    transform: translateY(-100%);
    transition: transform .35s ease;
  }
  .header.is-visible{ transform: translateY(0); }

  .logo{
    display:flex;
    align-items:center;
    gap: var(--sp-8);
  }
  .logo svg{ display:block; height: 33px; width:auto; }

  .header__eyebrow{
    display:inline-flex;
    align-items:center;
    gap: var(--sp-8);
    padding: var(--sp-6) var(--sp-16);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-full);
    font-size: var(--caption-sm);
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }
  .header__eyebrow .pulse-dot{
    width:8px; height:8px; border-radius:50%;
    background: var(--accent-live);
    box-shadow: 0 0 0 0 rgba(209,36,36,0.6);
    animation: pulse 1.8s infinite;
  }
  @keyframes pulse{
    0%   { box-shadow: 0 0 0 0 rgba(209,36,36,0.55); }
    70%  { box-shadow: 0 0 0 8px rgba(209,36,36,0); }
    100% { box-shadow: 0 0 0 0 rgba(209,36,36,0); }
  }

  /* ============ HERO — full-screen splash ============ */
  .splash{
    position: relative;
    overflow: hidden;
    height: 800px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding: var(--sp-64) var(--grid-margin);
    background: #0C1216;
  }

  .splash__video{
    position:absolute;
    inset:0;
    z-index:0;
    width:100%;
    height:100%;
    object-fit:cover;
    will-change: transform;
  }
  .splash__video--mobile{ display:none; }

  .splash__scrim{
    position:absolute;
    inset:0;
    z-index:1;
    background: linear-gradient(180deg, rgba(8,14,18,0.35) 0%, rgba(8,14,18,0.35) 50%, rgba(8,14,18,0.72) 100%);
  }

  .splash__content{
    position:relative;
    z-index:2;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: var(--sp-32);
    will-change: transform, opacity;
  }

  .splash__logo svg{
    display:block;
    height: 72px;
    width:auto;
  }

  .splash__title{
    font-size: 96px;
    line-height: 1.0;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: #FFFFFF;
  }

  .splash__subtitle{
    font-size: 22px;
    line-height: 1.45;
    font-weight: 400;
    color: rgba(255,255,255,0.82);
    max-width: 760px;
    margin-top: calc(-1 * var(--sp-16));
  }


  /* ============ SECTION SHELL ============ */
  .section{
    max-width: var(--max-width);
    margin: 0 auto;
    padding: var(--sp-96) var(--grid-margin);
  }
  .section__head{
    margin-bottom: var(--sp-48);
  }
  .section__head h2{
    font-size: var(--heading-h4);
    font-weight: 800;
    letter-spacing: -0.01em;
  }
  .section__head p{
    margin-top: var(--sp-8);
    color: var(--text-tertiary);
    font-size: var(--caption-sm);
  }

  /* ============ FEATURE BANDS — stacked full-width (Apple-style) ============ */
  #feature-bands{
    display:flex;
    flex-direction:column;
    gap: var(--sp-16);
    margin-top: var(--sp-16);
  }
  .feature-band{
    position:relative;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-end;
    text-align:center;
    min-height: 640px;
    padding: var(--sp-96) var(--grid-margin) 50px;
    background: var(--surface-1);
  }
  .feature-band:nth-of-type(even){ background: var(--surface-2); }

  /* Label pinned to the top-left corner of every feature band */
  .feature-band > .label{
    position: absolute;
    top: var(--sp-16);
    left: var(--sp-16);
    z-index: 2;
  }

  /* Multi-View band — photo backdrop, dark text on white (horizontal for desktop) */
  .feature-band--multi-view{
    background-color: #FFFFFF;
    background-image: url('assets/img/multiview-desktop.png');
    background-repeat: no-repeat;
    background-position: center calc(20% + var(--mv-shift, 0px));
    background-size: unset;
    justify-content: flex-start;
  }
  .feature-band--multi-view h2{ color: #08090B; }
  .feature-band--multi-view .feature-band__tagline{ color: #3F3F46; }
  .feature-band--multi-view .label{ background: #080E12; color: var(--brand-primary); }

  /* Win Probability band — same light background and text colors as Multi-View */
  .feature-band--win-probability-overlay{ background-color: #FFFFFF; justify-content: flex-end; }
  .feature-band--win-probability-overlay h2{ color: #08090B; }
  .feature-band--win-probability-overlay .feature-band__tagline{ color: #3F3F46; }
  .feature-band--win-probability-overlay .label{ background: #080E12; color: var(--brand-primary); }

  /* Win Probability band — floating live-scorecards backdrop (scroll parallax) */
  /* Fixed-size canvas so the scorecards keep their size like an image (cropped, not scaled, on smaller viewports) */
  .wp-cluster{ position:absolute; top:0; left:50%; transform:translateX(-50%); width:1280px; height:70%; z-index:0; pointer-events:none; }
  .wp-card{ position:absolute; background:#12141c; border-radius:0.9em; color:#fff; box-shadow:0 0.5em 1.4em rgba(0,0,0,0.16); will-change:transform; container-type:inline-size; overflow:hidden; }
  .wp-sizer{ padding:1.3em 1.15em; font-size:5cqw; }
  .wp-shaded{ background:radial-gradient(circle at 20% 12%,rgba(255,255,255,0.14),transparent 42%),radial-gradient(circle at 82% 88%,rgba(255,255,255,0.09),transparent 45%),linear-gradient(135deg,#1d2029 0%,#12141c 50%,#080910 100%); box-shadow:0 0.7em 1.8em rgba(0,0,0,0.3),inset 0 0.08em 0.15em rgba(255,255,255,0.06); }
  .wp-flags{ display:flex; align-items:center; justify-content:center; gap:1em; }
  .wp-flag{ width:2.4em; height:1.75em; border-radius:0.25em; flex-shrink:0; }
  .wp-score{ font-size:2.3em; font-weight:700; letter-spacing:0.03em; white-space:nowrap; line-height:1; }
  .wp-codes{ display:flex; justify-content:space-between; margin-top:0.5em; font-size:0.82em; font-weight:600; letter-spacing:0.04em; color:#e6e6ea; }
  .wp-min{ color:#e0463f; font-size:0.72em; text-align:center; margin-top:0.5em; display:flex; align-items:center; justify-content:center; gap:0.25em; }
  .wp-dot{ width:0.35em; height:0.35em; border-radius:50%; background:#e0463f; display:inline-block; }
  .wp-events{ margin-top:1.5em; display:flex; flex-direction:column; gap:0.9em; }
  .wp-ev{ display:flex; align-items:center; gap:0.55em; font-size:0.78em; white-space:nowrap; }
  .wp-chip{ background:#232635; color:#f0c419; font-weight:700; border-radius:0.35em; padding:0.18em 0.55em; min-width:2.4em; text-align:center; }
  .wp-ball{ width:1.3em; height:1.3em; border-radius:50%; border:0.1em solid #fff; flex-shrink:0; }
  .wp-yc{ width:0.8em; height:1.1em; border-radius:0.12em; background:#f0c419; flex-shrink:0; }
  .wp-esp{ background:linear-gradient(to bottom,#aa151b 25%,#f1bf00 25% 75%,#aa151b 75%); }
  .wp-fra{ background:linear-gradient(to right,#0055a4 33%,#fff 33% 66%,#ef4135 66%); }
  .wp-bra{ background:radial-gradient(circle,#f8d117 30%,#009c3b 31%); }
  .wp-arg{ background:linear-gradient(to bottom,#75aadb 33%,#fff 33% 66%,#75aadb 66%); }
  .wp-ger{ background:linear-gradient(to bottom,#000 33%,#dd0000 33% 66%,#ffce00 66%); }
  .wp-ned{ background:linear-gradient(to bottom,#ae1c28 33%,#fff 33% 66%,#21468b 66%); }
  .wp-ita{ background:linear-gradient(to right,#009246 33%,#fff 33% 66%,#ce2b37 66%); }
  .wp-por{ background:linear-gradient(to right,#046a38 40%,#da291c 40%); }
  .wp-jpn{ background:radial-gradient(circle,#bc002d 25%,#fff 26%); }
  .wp-kor{ background:radial-gradient(circle at 50% 50%,#003478 20%,#fff 21% 60%,#c60c30 61%); }
  .wp-usa{ background:linear-gradient(#b31942 0 12%,#fff 12% 20%,#b31942 20% 32%,#fff 32% 40%,#b31942 40% 52%,#fff 52% 60%,#b31942 60%),linear-gradient(to right,#0a3161 45%,transparent 45%); }
  .wp-mex{ background:linear-gradient(to right,#006847 33%,#fff 33% 66%,#ce1126 66%); }
  .wp-cro{ background:repeating-conic-gradient(#c8102e 0 90deg,#fff 0 180deg); background-size:0.5em 0.5em; }
  .wp-mar{ background:#c1272d; }
  .wp-swe{ background:linear-gradient(to bottom,transparent 42%,#fecc02 42% 56%,transparent 56%),linear-gradient(to right,transparent 32%,#fecc02 32% 44%,transparent 44%),#006aa7; }
  .wp-nor{ background:linear-gradient(to bottom,transparent 42%,#fff 42% 58%,transparent 58%),linear-gradient(to right,transparent 32%,#fff 32% 46%,transparent 46%),#ba0c2f; }
  .wp-col{ background:linear-gradient(to bottom,#fcd116 45%,#003893 45% 72%,#ce1126 72%); }
  .wp-uru{ background:repeating-linear-gradient(#fff 0 0.35em,#75aadb 0.35em 0.7em); }

  /* Faster start-up band — dark photo backdrop (light text stays legible) */
  .feature-band.feature-band--faster-startup-mobile{
    background-color: #eaeaea;
    background-image: linear-gradient(180deg, rgba(12,22,28,0) 28%, rgba(12,22,28,0.85) 60%, #0C161C 78%), url('assets/img/faster-startup.png');
    background-size: cover;
    background-position: center, center calc(10% + var(--fs-shift, 0px));
    background-repeat: no-repeat;
  }
  .feature-band--faster-startup-mobile .feature-band__content{
    transform: translateY(var(--fs-text, 0px));
    will-change: transform;
  }
  .feature-band--faster-startup-mobile .label{ background: #0C161C; color: #79E99C; }

  .feature-band__content{
    position:relative;
    z-index:1;
    max-width: 760px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: var(--sp-16);
  }

  .feature-band h2{
    font-size: 50px;
    line-height: 1.05;
    font-weight: 600;
    letter-spacing: -0.015em;
  }
  .feature-band__tagline{
    font-size: 28px;
    line-height: 1.25;
    font-weight: 400;
    color: var(--text-secondary);
    max-width: 600px;
  }
  .feature-band__ctas{
    display:flex;
    gap: var(--sp-16);
    flex-wrap:wrap;
    justify-content:center;
    margin-top: var(--sp-16);
  }

  /* ============ HIGHLIGHTS — uniform 2-up tile grid ============ */
  #highlights{
    max-width: none;
    margin: 0;
    padding: var(--sp-16);
  }
  .grid{
    display:grid;
    gap: var(--sp-16);
    grid-template-columns: repeat(2, 1fr);
  }

  .card{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    min-height: 520px;
    background: var(--surface-5);
    border: 1px solid #76828c36;
    border-radius: 20px;
    overflow:hidden;
  }
  /* Light tiles — same background and text colors as the Multi-View band */
  .card--light{ background: #FFFFFF; }
  .card--light .card__title{ color: #08090B; }
  .card--light .card__benefit{ color: #3F3F46; }
  .card--light .label{ background: #080E12; color: var(--brand-primary); }
  /* Staggered slide-in (gated on .reveal so cards stay visible without JS) */
  .grid.reveal .card{
    opacity: 0;
    transform: translateY(48px);
    transition: opacity .6s ease, transform .7s cubic-bezier(.22,.61,.36,1);
    transition-delay: calc(var(--i, 0) * 0.09s);
  }
  .grid.reveal .card.in{ opacity: 1; transform: none; }

  /* Inner content settles into place with a little extra parallax + stagger */
  .grid.reveal .card__title,
  .grid.reveal .card__benefit,
  .grid.reveal .card__ctas{
    opacity: 0;
    transform: translateY(18px);
    transition: opacity .5s ease, transform .6s cubic-bezier(.22,.61,.36,1);
  }
  .grid.reveal .card.in .card__title{ opacity: 1; transform: none; transition-delay: .12s; }
  .grid.reveal .card.in .card__benefit{ opacity: 1; transform: none; transition-delay: .2s; }
  .grid.reveal .card.in .card__ctas{ opacity: 1; transform: none; transition-delay: .28s; }

  .card__body{
    display:flex;
    flex:1;
    flex-direction:column;
    align-items:center;
    justify-content:flex-end;
    gap: var(--sp-12);
    padding: var(--sp-48) var(--sp-32);
    width:100%;
  }
  .card > .label{
    position: absolute;
    top: var(--sp-16);
    left: var(--sp-16);
    z-index: 2;
  }

  .card__title{
    font-size: 40px;
    line-height: 1.08;
    font-weight: 600;
    letter-spacing: -0.015em;
  }

  .card__benefit{
    font-size: 24px;
    line-height: 1.3;
    font-weight: 400;
    color: var(--text-secondary);
    max-width: 90%;
  }

  .card__ctas{
    display:flex;
    gap: var(--sp-12);
    margin-top: var(--sp-16);
    flex-wrap:wrap;
    justify-content:center;
  }


  .label{
    display:inline-flex;
    align-items:center;
    align-self:flex-start;
    height: 24px;
    padding: 0 var(--sp-6);
    border-radius: 2px;
    font-size: var(--label-sm);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.01em;
    white-space:nowrap;
  }
  .label--new{ background: var(--label-yellow-secondary-bg); color: var(--label-yellow-secondary-color); }
  .label--upgrade{ background: var(--label-blue-secondary-bg); color: var(--label-blue-secondary-color); }
  .label--improve{ background: var(--label-green-secondary-bg); color: var(--label-green-secondary-color); }
  .label--integration{ background: var(--label-purple-secondary-bg); color: var(--label-purple-secondary-color); }
  .label--live{ background: var(--label-red-secondary-bg); color: var(--label-red-secondary-color); }

  /* ============ FOOTER ============ */
  .footer{
    border-top: 1px solid #76828c36;
    background: #FFFFFF;
    padding: var(--sp-64) var(--grid-margin) var(--sp-40);
  }
  .footer__inner{ max-width: var(--max-width); margin: 0 auto; }
  .footer__cols{
    display:grid;
    grid-template-columns: repeat(5, 1fr);
    gap: var(--sp-32);
  }
  .footer__col h4{
    font-size: var(--caption-xs);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-tertiary);
    margin-bottom: var(--sp-16);
  }
  .footer__col a{
    display:block;
    font-size: var(--caption-sm);
    color: var(--text-secondary);
    padding: var(--sp-6) 0;
    transition: color .15s ease;
  }
  .footer__col a:hover{ color: var(--text-primary); }

  .footer__bottom{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap: var(--sp-16);
    flex-wrap:wrap;
    font-size: var(--caption-xs);
    color: #6E6E73;
  }
  .footer__legal a{ margin-left: var(--sp-20); }
  .footer__legal a:first-child{ margin-left: 0; }
  .footer__legal a:hover{ color: #1D1D1F; }

  @media (prefers-reduced-motion: reduce){
    .pulse-dot{ animation: none; }
  }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 1000px){
    .footer__cols{ grid-template-columns: repeat(3, 1fr); row-gap: var(--sp-40); }
  }

  @media (max-width: 900px){
    .header, .splash, .section{ padding-left: var(--sp-24); padding-right: var(--sp-24); }
    .splash{ justify-content: flex-end; }
    .splash__title{ font-size: 62px; }
    .splash__subtitle{ font-size: 22px; }
    .splash__logo svg{ height: 62px; }
    .splash__video--desktop{ display:none; }
    .splash__video--mobile{ display:block; }
    .feature-band{
      min-height: 520px;
      padding: 30px;
      justify-content: flex-end;
      align-items: flex-start;
      text-align: left;
    }
    .feature-band__content{ align-items: flex-start; text-align: left; }
    .feature-band h2{ font-size: 32px; }
    .feature-band__tagline{ font-size: 20px; }
    .feature-band--multi-view{
      background-color: #FFFFFF;
      background-image: url('assets/img/multiview-mobile.png');
      background-position: right -160px top calc(-20px - var(--mv-shift, 0px));
      background-size: auto calc(105% * var(--mv-zoom, 1));
      padding-right: 140px;
    }
    .grid{ grid-template-columns: 1fr; }
    .card{ padding: 30px; align-items: flex-start; text-align: left; }
    .card__body{ padding: 0; align-items: flex-start; justify-content: flex-end; text-align: left; }
  }

  @media (max-width: 640px){
    .card{ min-height: 440px; }
    .card__title{ font-size: 32px; }
    .card__benefit{ font-size: 20px; }

    /* ---- HIGHLIGHTS: remaining updates as uniform 2-up tiles ---- */
    const lightCards = ['airplay-chromecast-handoff', '4k-hdr-expansion', 'offline-downloads', 'watch-party-chat-redesign'];
    const card = (e) => `
      <article class="card${lightCards.includes(e.id) ? ' card--light' : ''}">
        <div class="card__body">
          <h3 class="card__title">${e.name}</h3>
          <p class="card__benefit">${e.tagline}</p>

      </article>`;

    /* ---- Tiles slide into place, staggered, as they scroll into view ---- */
    (() => {
      const grid = document.getElementById('grid');
      const cards = grid ? [...grid.querySelectorAll('.card')] : [];
      const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (!cards.length || reduce || !('IntersectionObserver' in window)) return;
      grid.classList.add('reveal');
      // stagger left→right within each 2-up row
      cards.forEach((c, i) => c.style.setProperty('--i', i % 2));
      const io = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }
        });
      }, { threshold: 0.15, rootMargin: '0px 0px -50px 0px' });
      cards.forEach(c => io.observe(c));
      // safety net: if anything is still hidden after 2.5s, reveal it
      setTimeout(() => cards.forEach(c => c.classList.add('in')), 2500);
    })();

    /* ---- Slide the header in after scrolling 80px ---- */
    const header = document.querySelector('.header');
    if (header) {
      const syncHeader = () => header.classList.toggle('is-visible', window.scrollY > 80);
      syncHeader();
      window.addEventListener('scroll', syncHeader, { passive: true });
    }

    /* ---- Hero parallax: video and title/logo drift apart as you scroll ---- */
    const splash = document.querySelector('.splash');
    const splashVideos = document.querySelectorAll('.splash__video');
    const splashContent = document.querySelector('.splash__content');
    if (splash && splashContent && !window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      let ticking = false;
      const updateHeroParallax = () => {
        const y = window.scrollY;
        const h = splash.offsetHeight;
        if (y <= h) {
          const p = y / h;
          splashVideos.forEach(v => { v.style.transform = `translate3d(0, ${y * 0.2}px, 0) scale(1.12)`; });
          splashContent.style.transform = `translate3d(0, ${y * -0.4}px, 0)`;
          splashContent.style.opacity = String(Math.max(0, 1 - p * 1.5));
        }
        ticking = false;
      };
      updateHeroParallax();
      window.addEventListener('scroll', () => {
        if (!ticking) { requestAnimationFrame(updateHeroParallax); ticking = true; }
      }, { passive: true });
    }

    /* ---- Multi-View band: subtle photo parallax on scroll ---- */
    const mvBand = document.querySelector('.feature-band--multi-view');
    if (mvBand && !window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      let mvTicking = false;
      const updateMvParallax = () => {
        const rect = mvBand.getBoundingClientRect();
        const vh = window.innerHeight;
        if (rect.bottom > 0 && rect.top < vh) {
          const norm = ((rect.top + rect.height / 2) - vh / 2) / (vh / 2 + rect.height / 2);
          mvBand.style.setProperty('--mv-shift', (-norm * 50).toFixed(1) + 'px');
          const progress = Math.min(1, Math.max(0, (vh - rect.top) / (vh + rect.height)));
          mvBand.style.setProperty('--mv-zoom', (1 + progress * 0.08).toFixed(3));
        }
        mvTicking = false;
      };
      updateMvParallax();
      window.addEventListener('scroll', () => {
        if (!mvTicking) { requestAnimationFrame(updateMvParallax); mvTicking = true; }
      }, { passive: true });
    }

    /* ---- Faster start-up band: background and text drift apart on scroll ---- */
    const fsBand = document.querySelector('.feature-band--faster-startup-mobile');
    if (fsBand && !window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      let fsTicking = false;
      const updateFsParallax = () => {
        const rect = fsBand.getBoundingClientRect();
        const vh = window.innerHeight;
        if (rect.bottom > 0 && rect.top < vh) {
          const norm = ((rect.top + rect.height / 2) - vh / 2) / (vh / 2 + rect.height / 2);
          fsBand.style.setProperty('--fs-shift', (norm * 45).toFixed(1) + 'px');
          fsBand.style.setProperty('--fs-text', (norm * -32).toFixed(1) + 'px');
        }
        fsTicking = false;
      };
      updateFsParallax();
      window.addEventListener('scroll', () => {
        if (!fsTicking) { requestAnimationFrame(updateFsParallax); fsTicking = true; }
      }, { passive: true });
    }

    /* ---- Win Probability band: floating scorecards drift at different depths ---- */
    const wpBand = document.querySelector('.feature-band--win-probability-overlay');
    if (wpBand && !window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      const wpCards = [...wpBand.querySelectorAll('.wp-card')];
      let wpTicking = false;
      const updateWpParallax = () => {
        const rect = wpBand.getBoundingClientRect();
        const vh = window.innerHeight;
        if (rect.bottom > 0 && rect.top < vh) {
          // -1 (band below viewport) → 0 (centered) → 1 (band above viewport)
          const norm = ((rect.top + rect.height / 2) - vh / 2) / (vh / 2 + rect.height / 2);
          wpCards.forEach((card) => {
            const depth = parseFloat(card.dataset.depth) || 0.1;
            const baseRot = parseFloat(card.dataset.rot) || 0;
            const shiftBase = parseFloat(card.dataset.shift) || 0;
            // Deeper (fainter/blurred) cards drift far and faster; front cards barely move → depth
            const shift = norm * depth * 620;
            const drift = norm * depth * baseRot * 0.9;   // rotation opens up slightly with scroll
            card.style.transform = `translateY(${(shift + shiftBase).toFixed(1)}px) rotate(${(baseRot + drift).toFixed(2)}deg)`;
          });
        }
        wpTicking = false;
      };
      updateWpParallax();
      window.addEventListener('scroll', () => {
        if (!wpTicking) { requestAnimationFrame(updateWpParallax); wpTicking = true; }
      }, { passive: true });
    }
  </script>

</body>
</html>
